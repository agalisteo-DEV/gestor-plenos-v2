<section class="space-y-4">
  <div class="flex justify-between items-center"><h2 class="text-2xl font-bold">Plenos</h2><a routerLink="/app/plenos/new" class="bg-emerald-700 text-white px-4 py-2 rounded">Añadir pleno</a></div>
  <div class="grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
    @for (pleno of (plenos$ | async); track pleno.id) {
      <article class="bg-slate-800 text-white rounded-xl overflow-hidden shadow relative">
        <img [src]="pleno.imageUrl" [alt]="pleno.title" class="h-44 w-full object-cover opacity-90">
        <div class="absolute top-3 left-3 bg-black/60 rounded px-2 py-1 text-xs">{{ pleno.dateIso }}</div>
        <div class="p-4 text-center space-y-2">
          <p class="font-semibold">{{ pleno.title }}</p>
          <span class="inline-block rounded px-2 py-1 text-xs" [class.bg-emerald-600]="pleno.estado==='CERRADO'" [class.bg-orange-600]="pleno.estado==='BORRADOR'" [class.bg-sky-600]="pleno.estado==='PUBLICADO'">{{ pleno.estado }}</span>
          <button class="block mx-auto bg-emerald-700 px-4 py-1 rounded" (click)="setActive(pleno.id, pleno.title, pleno.slug)">Seleccionar</button>
        </div>
      </article>
    }
  </div>
</section>
