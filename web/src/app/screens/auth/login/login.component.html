<section class="min-h-screen grid place-items-center bg-slate-100 p-4">
  <form class="bg-white rounded-2xl shadow p-6 w-full max-w-md space-y-3" (ngSubmit)="submit()">
    <h1 class="text-2xl font-bold">Iniciar sesión</h1>
    <input [(ngModel)]="username" name="username" class="w-full border rounded p-2" />
    <input [(ngModel)]="password" name="password" type="password" class="w-full border rounded p-2" />
    <button class="w-full bg-orange-600 text-white rounded p-2" type="submit">Entrar</button>
    @if (error) { <p class="text-red-600">{{ error }}</p> }
  </form>
</section>
